<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Copa 2026 — Grupos & Brasil</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0d1117;--s1:#161b22;--s2:#1c2330;--s3:#21283a;
  --bdr:#30363d;--bdr2:#3d4450;
  --gold:#e3a008;--gold2:#fbbf24;--gbg:rgba(227,160,8,.12);
  --grn:#3fb950;--gbg2:rgba(63,185,80,.13);
  --red:#f85149;--rbg:rgba(248,81,73,.13);
  --blu:#58a6ff;--bbg:rgba(88,166,255,.13);
  --orn:#e3b341;--obg:rgba(227,179,65,.13);
  --txt:#e6edf3;--dim:#8b949e;--dim2:#484f58;
  --br:#009c3b;--brbg:rgba(0,156,59,.12);
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--txt);font-family:'Inter',sans-serif;min-height:100vh}

header{background:var(--s1);border-bottom:1px solid var(--bdr);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;gap:10px;position:sticky;top:0;z-index:200}
.logo{font-family:'Barlow Condensed',sans-serif;font-size:1.35rem;font-weight:900;color:var(--gold2);letter-spacing:.04em}
.logo span{color:var(--dim);font-weight:400}
.btn-back{background:var(--s2);border:1px solid var(--bdr);border-radius:6px;color:var(--dim);padding:7px 12px;font-size:.78rem;text-decoration:none;display:inline-flex;align-items:center;gap:5px;transition:all .15s}
.btn-back:hover{color:var(--gold2);border-color:var(--gold)}
.sync-info{display:flex;align-items:center;gap:6px;font-size:.7rem;color:var(--dim)}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--dim2);flex-shrink:0}
.sync-dot.ok{background:var(--grn);animation:pulse 2s infinite}
.sync-dot.loading{background:var(--gold2);animation:pulse .6s infinite}
.sync-dot.err{background:var(--red)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}

.nav{background:var(--s1);border-bottom:1px solid var(--bdr);display:flex;overflow-x:auto;scrollbar-width:none}
.nav::-webkit-scrollbar{display:none}
.ntab{font-family:'Barlow Condensed',sans-serif;font-size:.82rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase;padding:10px 16px;background:none;border:none;border-bottom:2px solid transparent;color:var(--dim);cursor:pointer;white-space:nowrap;transition:all .15s}
.ntab.active{color:var(--gold2);border-bottom-color:var(--gold2)}
.ntab:hover:not(.active){color:var(--txt)}

.panel{display:none;padding:14px 14px 60px;max-width:900px;margin:0 auto}
.panel.active{display:block}

/* ── SECTION TITLE ── */
.section-title{font-family:'Barlow Condensed',sans-serif;font-size:.95rem;font-weight:700;color:var(--gold2);text-transform:uppercase;letter-spacing:.06em;margin:18px 0 10px;display:flex;align-items:center;gap:10px}
.section-title::after{content:'';flex:1;height:1px;background:var(--bdr)}

/* ── BRASIL GAMES ── */
.brasil-header{background:linear-gradient(135deg,#071c0e 0%,#0a1117 100%);border:1px solid rgba(0,156,59,.4);border-radius:10px;padding:14px;margin-bottom:14px}
.bh-title{font-family:'Barlow Condensed',sans-serif;font-size:1.2rem;font-weight:900;color:#4ade80;letter-spacing:.06em;text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}
.bh-subtitle{font-size:.72rem;color:rgba(74,222,128,.6);font-weight:400;letter-spacing:.1em}
.brasil-game-card{background:rgba(0,156,59,.07);border:1px solid rgba(0,156,59,.25);border-radius:8px;padding:11px 14px;margin-bottom:8px;position:relative;overflow:hidden}
.brasil-game-card.done{opacity:.75;border-color:rgba(0,156,59,.15)}
.brasil-game-card.next{border-color:rgba(74,222,128,.5);box-shadow:0 0 16px rgba(0,156,59,.12)}
.bgc-round{font-size:.65rem;font-weight:700;color:rgba(74,222,128,.7);text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px}
.bgc-match{font-size:1rem;font-weight:700;color:var(--txt);margin-bottom:8px;display:flex;align-items:center;gap:8px}
.bgc-score{font-family:'Barlow Condensed',sans-serif;font-size:1.3rem;font-weight:900;color:#4ade80;min-width:50px}
.bgc-result{font-size:.7rem;padding:2px 8px;border-radius:4px;font-weight:700}
.result-W{background:rgba(63,185,80,.2);color:var(--grn);border:1px solid var(--grn)}
.result-D{background:rgba(227,179,65,.2);color:var(--orn);border:1px solid var(--orn)}
.result-L{background:rgba(248,81,73,.2);color:var(--red);border:1px solid var(--red)}
.result-P{background:rgba(88,166,255,.1);color:var(--blu);border:1px solid var(--blu)}
.bgc-info{display:flex;flex-wrap:wrap;gap:5px}
.bchip{font-size:.67rem;padding:3px 7px;border-radius:4px;display:inline-flex;align-items:center;gap:3px}
.bchip-brt{background:var(--gbg);border:1px solid var(--gold);color:var(--gold2);font-weight:600}
.bchip-local{background:var(--bbg);border:1px solid var(--blu);color:var(--blu)}
.bchip-venue{background:var(--s2);border:1px solid var(--bdr);color:var(--dim)}
.bchip-next{background:rgba(74,222,128,.15);border:1px solid rgba(74,222,128,.5);color:#4ade80;font-weight:700;animation:pulse 2s infinite}
.next-badge{position:absolute;top:10px;right:12px;font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#4ade80;background:rgba(74,222,128,.12);border:1px solid rgba(74,222,128,.4);padding:2px 7px;border-radius:4px}

/* ── CHAVEAMENTO ── */
.bracket-container{background:var(--s1);border:1px solid var(--bdr);border-radius:10px;overflow:hidden;margin-bottom:10px}
.bracket-phase-header{background:var(--s2);padding:10px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--bdr)}
.bph-name{font-family:'Barlow Condensed',sans-serif;font-size:.9rem;font-weight:700;color:var(--gold2);text-transform:uppercase;letter-spacing:.05em}
.bph-date{font-size:.72rem;color:var(--dim)}
.bracket-game{padding:12px 14px;border-bottom:1px solid var(--bdr);display:grid;grid-template-columns:1fr auto;gap:12px;align-items:start}
.bracket-game:last-child{border-bottom:none}
.bracket-game.brasil-game{background:var(--brbg);border-left:3px solid var(--br)}
.bracket-game.brasil-game.knockout{border-left:3px solid #4ade80}
.bg-match-title{font-size:.88rem;font-weight:700;color:var(--txt);margin-bottom:5px;display:flex;align-items:center;gap:7px}
.bg-match-title .brasil-tag{font-size:.62rem;background:rgba(74,222,128,.15);color:#4ade80;border:1px solid rgba(74,222,128,.4);padding:1px 6px;border-radius:3px;font-weight:700}
.bg-detail{font-size:.75rem;color:var(--dim);line-height:1.6}
.bg-detail strong{color:var(--txt)}
.bg-detail .scenario{display:block;margin-top:3px;font-size:.7rem;padding:3px 7px;background:var(--s2);border-radius:4px;border-left:2px solid var(--gold);color:var(--gold2)}
.bg-detail .scenario.alt{border-left-color:var(--orn);color:var(--orn)}
.bg-times{text-align:right;white-space:nowrap}
.bg-brt{font-family:'Barlow Condensed',sans-serif;font-size:1.1rem;font-weight:700;color:var(--gold2);line-height:1.1}
.bg-brt-sub{font-size:.62rem;color:var(--dim);margin-top:1px}
.bracket-connector{padding:4px 14px;background:rgba(74,222,128,.04);border-bottom:1px solid rgba(0,156,59,.15)}
.bc-text{font-size:.67rem;color:rgba(74,222,128,.5);font-style:italic}
.status-pill{display:inline-block;font-size:.6rem;font-weight:700;padding:2px 7px;border-radius:4px;margin-left:7px}
.sp-confirmed{background:var(--gbg2);color:var(--grn);border:1px solid var(--grn)}
.sp-probable{background:var(--gbg);color:var(--gold2);border:1px solid var(--gold)}
.sp-possible{background:var(--s2);color:var(--dim);border:1px solid var(--bdr)}
.sp-tbd{background:var(--s3);color:var(--dim2);border:1px solid var(--bdr)}

/* Live score dentro do bracket */
.bg-score{font-family:'Barlow Condensed',sans-serif;font-size:1.05rem;font-weight:900;color:var(--grn);min-width:40px;text-align:right}
.bg-score.live{color:var(--gold2);animation:pulse 1.5s infinite}

/* ── GRUPOS ── */
.groups-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:8px}
.group-card{background:var(--s1);border:1px solid var(--bdr);border-radius:8px;overflow:hidden}
.group-card.has-brasil{border-color:rgba(0,156,59,.4)}
.gh{background:var(--s2);padding:8px 12px;font-family:'Barlow Condensed',sans-serif;font-size:.88rem;font-weight:700;color:var(--gold2);letter-spacing:.05em;text-transform:uppercase;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--bdr)}
.gt{width:100%;border-collapse:collapse;font-size:.78rem}
.gt th{font-size:.58rem;color:var(--dim);text-transform:uppercase;letter-spacing:.04em;padding:5px 8px;text-align:right;font-weight:600;border-bottom:1px solid var(--bdr)}
.gt th:first-child{text-align:left}
.gt td{padding:6px 8px;border-top:1px solid rgba(48,54,61,.5)}
.gt td:first-child{font-weight:600;text-align:left}
.gt td:not(:first-child){text-align:right;color:var(--dim)}
.gt .pts{color:var(--txt)!important;font-weight:700!important}
.gt .br-row{background:var(--brbg)}
.gt .pos{font-size:.7rem;color:var(--dim2);margin-right:5px}
.gt .pos.q1,.gt .pos.q2{color:var(--grn)}
.gt .pos.q3{color:var(--orn)}
.qual-legend{display:flex;gap:10px;padding:7px 10px;font-size:.62rem;color:var(--dim);border-top:1px solid var(--bdr);background:var(--s2)}
.ql{display:flex;align-items:center;gap:4px}
.ql::before{content:'';width:8px;height:8px;border-radius:2px;flex-shrink:0}
.ql.q12::before{background:var(--grn)}
.ql.q3::before{background:var(--orn)}

/* ── TODOS OS JOGOS ── */
.day-block{margin-bottom:20px}
.day-label{font-family:'Barlow Condensed',sans-serif;font-size:.82rem;font-weight:700;color:var(--gold2);text-transform:uppercase;letter-spacing:.08em;padding:5px 0;border-bottom:1px solid var(--bdr);margin-bottom:8px;display:flex;align-items:center;justify-content:space-between}
.day-label span{font-size:.65rem;color:var(--dim);font-weight:400}
.match-row{background:var(--s1);border:1px solid var(--bdr);border-radius:7px;padding:9px 12px;margin-bottom:5px;display:grid;grid-template-columns:50px 1fr auto auto;gap:8px;align-items:center;transition:border-color .12s}
.match-row:hover{border-color:var(--bdr2)}
.match-row.brasil{border-left:3px solid var(--br)}
.mr-grp{font-size:.65rem;font-weight:700;color:var(--dim)}
.mr-city{font-size:.58rem;color:var(--dim2)}
.mr-teams{font-size:.82rem;font-weight:600;display:flex;align-items:center;gap:5px}
.mr-teams .br{color:#4ade80}
.mr-score{font-family:'Barlow Condensed',sans-serif;font-size:1rem;font-weight:700;color:var(--grn);text-align:right;min-width:38px}
.mr-score.pending{color:var(--dim2)}
.mr-times{text-align:right}
.mr-brt{font-size:.78rem;font-weight:600;color:var(--gold2)}
.mr-local{font-size:.62rem;color:var(--dim)}
.ft-badge{font-size:.58rem;font-weight:700;padding:2px 5px;border-radius:3px;background:var(--gbg2);color:var(--grn);border:1px solid var(--grn)}

/* ── ODDS ── */
.odds-card{background:var(--s1);border:1px solid var(--bdr);border-radius:8px;padding:13px;margin-bottom:8px}
.oc-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px;gap:8px}
.oc-match{font-size:.9rem;font-weight:700;color:var(--txt)}
.oc-date{font-size:.68rem;color:var(--dim);margin-top:2px}
.oc-bk{font-size:.62rem;color:var(--dim2)}
.odds-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px}
.odd-cell{background:var(--s2);border:1px solid var(--bdr);border-radius:5px;padding:7px 6px;text-align:center}
.odd-cell.best{border-color:var(--gold);background:var(--gbg)}
.odd-lbl{font-size:.6rem;color:var(--dim);text-transform:uppercase;letter-spacing:.04em;margin-bottom:3px}
.odd-val{font-family:'Barlow Condensed',sans-serif;font-size:1.15rem;font-weight:700;color:var(--txt);line-height:1}
.odd-cell.best .odd-val{color:var(--gold2)}
.odds-empty{color:var(--dim);font-size:.8rem;text-align:center;padding:20px;background:var(--s1);border:1px solid var(--bdr);border-radius:8px}

/* ── STATUS BAR ── */
.sbar{display:flex;align-items:center;justify-content:space-between;background:var(--s2);border:1px solid var(--bdr);border-radius:7px;padding:7px 11px;margin-bottom:12px;font-size:.7rem;color:var(--dim);gap:8px;flex-wrap:wrap}
.sbar.ok{border-color:var(--grn);background:var(--gbg2);color:var(--grn)}
.sbar.err{border-color:var(--red);background:var(--rbg);color:var(--red)}
.sbar.loading{border-color:var(--gold);background:var(--gbg);color:var(--gold2)}
</style>
</head>
<body>
<header>
  <div class="logo">⚽ COPA 26 <span>// Grupos & Chave</span></div>
  <div style="display:flex;align-items:center;gap:10px">
    <div class="sync-info">
      <div class="sync-dot" id="hdot"></div>
      <span id="hlbl">Carregando...</span>
    </div>
    <a href="index.html" class="btn-back">← Bolão</a>
  </div>
</header>
<div class="nav">
  <button class="ntab active" onclick="showTab('brasil')">🇧🇷 Brasil</button>
  <button class="ntab" onclick="showTab('grupos')">Grupos</button>

  <button class="ntab" onclick="showTab('odds')">Odds</button>
</div>

<div id="tab-brasil" class="panel active">
  <div class="sbar" id="brasil-status">Carregando dados...</div>

</div>

<div id="tab-grupos" class="panel">

</div>

<div id="tab-jogos" class="panel">
  <div class="sbar" id="jogos-status">Carregando partidas...</div>

</div>

<div id="tab-odds" class="panel">

</div>

// Chaveamento fixo da FIFA 2026 (estrutura imutável)

// Slot: qual posição de grupo enfrenta quem

// Mapear nomes do openfootball para as chaves internas
const WC_NAME_MAP = {
  'Brazil':'Brasil','Morocco':'Marrocos','Haiti':'Haiti','Scotland':'Escócia',
  'Germany':'Alemanha','Curaçao':'Curaçao','Netherlands':'Holanda','Japan':'Japão',
  "Côte d'Ivoire":'C. do Marfim','Ecuador':'Equador','Sweden':'Suécia','Tunisia':'Tunísia',
  'Spain':'Espanha','Cape Verde':'Cabo Verde','Belgium':'Bélgica','Egypt':'Egito',
  'Saudi Arabia':'Ar. Saudita','Uruguay':'Uruguai','France':'França','Senegal':'Senegal',
  'Iraq':'Iraque','Norway':'Noruega','Argentina':'Argentina','Algeria':'Argélia',
  'Portugal':'Portugal','DR Congo':'Congo DR','England':'Inglaterra','Croatia':'Croácia',
  'Mexico':'México','South Africa':'África do Sul','South Korea':'Coreia do Sul',
  'Czech Republic':'Rep. Tcheca','Canada':'Canadá','USA':'EUA','Switzerland':'Suíça',
  'Qatar':'Qatar','Paraguay':'Paraguai','Australia':'Austrália','Turkey':'Turquia',
  'Ghana':'Gana','Panama':'Panamá','Iran':'Irã','New Zealand':'Nova Zelândia',
  'Jordan':'Jordânia','Bosnia and Herzegovina':'Bósnia e Herz.',
};
function wcName(n){return WC_NAME_MAP[n]||n;}

// Parse matches e compute standings
function parseAndCompute(data){
  const matches = data.matches || [];
  // reset
  matchResults = {};
  groupStandings = {};
  Object.keys(GROUPS_DEF).forEach(g=>{
    groupStandings[g] = GROUPS_DEF[g].t.map(t=>({t,j:0,v:0,e:0,d:0,gp:0,gc:0,pts:0,sg:0}));
  });

  matches.forEach((m,idx)=>{
    const ft=m.score&&m.score.ft;
    const has=!!(ft&&ft.length===2);
    const t1=wcName(m.team1), t2=wcName(m.team2);
    const g1=has?ft[0]:null, g2=has?ft[1]:null;
    // match to ALL_MATCHES_DEF
    const def=ALL_MATCHES_DEF.find(d=>d.wc&&((d.wc[0]===m.team1&&d.wc[1]===m.team2)||(d.wc[1]===m.team1&&d.wc[0]===m.team2)));
    if(def){
      const normal = def.wc[0]===m.team1;
      matchResults[def.id]={
        g1: normal?(g1!=null?String(g1):null):(g2!=null?String(g2):null),
        g2: normal?(g2!=null?String(g2):null):(g1!=null?String(g1):null),
        state: has?'post':'pre',
      };
    }
    // update standings
    if(!has)return;
    const grp=m.group&&m.group.replace(/Group\s+/i,'');
    if(!grp||!groupStandings[grp])return;
    const s=groupStandings[grp];
    const r1=s.find(r=>r.t===t1), r2=s.find(r=>r.t===t2);
    if(!r1||!r2)return;
    r1.j++;r2.j++;r1.gp+=g1;r2.gp+=g2;r1.gc+=g2;r2.gc+=g1;r1.sg+=g1-g2;r2.sg+=g2-g1;
    if(g1>g2){r1.v++;r1.pts+=3;r2.d++;}
    else if(g1<g2){r2.v++;r2.pts+=3;r1.d++;}
    else{r1.e++;r2.e++;r1.pts++;r2.pts++;}
  });
  // ordenar cada grupo
  Object.keys(groupStandings).forEach(g=>{
    groupStandings[g].sort((a,b)=>b.pts-a.pts||b.sg-a.sg||b.gp-a.gp);
  });
}

// Dado um slot, retorna o nome do time (se já definido pelos resultados)
function slotTeam(slotRef, pos){
  if(!slotRef)return null;
  const st=groupStandings[slotRef];
  if(!st||!st[pos-1])return null;
  return st[pos-1].t;
}

// Obter resultado do jogo do Brasil por rodada
function getBrasilMatch(matchId){
  const r=matchResults[matchId];
  const def=ALL_MATCHES_DEF.find(d=>d.id===matchId);
  if(!def||!r)return null;
  const isBrasilHome=def.t1==='Brasil'||def.t1==='Brazil';
  const brasilGoals=isBrasilHome?r.g1:r.g2;
  const opGoals=isBrasilHome?r.g2:r.g1;
  let result=null;
  if(r.state==='post'&&brasilGoals!=null&&opGoals!=null){
    const bg=+brasilGoals,og=+opGoals;
    result=bg>og?'W':bg===og?'D':'L';
  }
  return{...r, result, brasilGoals, opGoals};
}

    card.className='group-card'+(hasBrasil?' has-brasil':'');
    let rows=standing.map((r,i)=>{
      const isBr=r.t==='Brasil';
      const q=i<2?'q1 q2':'q3';
      return`<tr${isBr?' class="br-row"':''}>
        <td><span class="pos ${q}">${i+1}°</span>${r.t}${isBr?' 🇧🇷':''}</td>
        <td>${r.j||0}</td>
        <td style="color:var(--grn)">${r.v||0}</td>
        <td style="color:var(--orn)">${r.e||0}</td>
        <td style="color:var(--red)">${r.d||0}</td>
        <td>${r.gp||0}:${r.gc||0}</td>
        <td class="pts">${r.pts||0}</td>
      </tr>`;
    }).join('');
    card.innerHTML=`<div class="gh">Grupo ${letter}${hasBrasil?' 🇧🇷':''}<span style="font-size:.65rem;color:var(--dim);font-weight:400">${hasResults?'atualizado':'aguardando'}</span></div>
      <table class="gt">
        <thead><tr><th>Seleção</th><th>J</th><th>V</th><th>E</th><th>D</th><th>GF:GC</th><th>Pts</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
      <div class="qual-legend">
        <span class="ql q12">Top 2 — classificados</span>
        <span class="ql q3">3º — disputa vaga</span>
      </div>`;
    el.appendChild(card);
  });
  const now=new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
  const sb=document.getElementById('grupos-status');
  sb.className='sbar ok';
  sb.textContent=`✓ Classificação atualizada · ${now}`;
}

// ─────────────────────────────────────────────────────────────────────────────
// RENDER TODOS OS JOGOS
// ─────────────────────────────────────────────────────────────────────────────
function renderJogos(){
  const el=document.getElementById('all-matches');
  const byDay={},dO=[];
  ALL_MATCHES_DEF.forEach(m=>{
    if(!byDay[m.d]){byDay[m.d]=[];dO.push(m.d);}
    byDay[m.d].push(m);
  });
  const td=today();
  let html='';
  dO.forEach(dk=>{
    const items=byDay[dk];
    const isToday=dk===td;
    html+=`<div class="day-block">
      <div class="day-label">${fmtDate(dk)}${isToday?' · <span style="color:#4ade80">HOJE</span>':''}
      <span>${items.length} jogo${items.length>1?'s':''}</span></div>`;
    items.forEach(m=>{
      const r=matchResults[m.id];
      const isDone=r&&r.state==='post';
      const score=isDone?`${r.g1}:${r.g2}`:'';
      html+=`<div class="match-row${m.brasil?' brasil':''}">
        <div><div class="mr-grp">Gr.${m.g}</div><div class="mr-city">${m.city}</div></div>
        <div class="mr-teams">${m.t1}${m.brasil&&(m.t1==='Brasil')?' <span class="br">🇧🇷</span>':''} <span style="color:var(--dim2)">vs</span> ${m.t2}${m.brasil&&(m.t2==='Brasil')?' <span class="br">🇧🇷</span>':''}</div>
        <div>${isDone?`<span class="ft-badge">FT</span>`:''}</div>
        <div class="mr-times">
          ${isDone?`<div class="mr-score">${score}</div>`:`<div class="mr-brt">🇧🇷 ${m.brt}</div><div class="mr-local">${m.loc}</div>`}
        </div>
      </div>`;
    });
    html+='</div>';
  });
  el.innerHTML=html;
  document.getElementById('jogos-status').className='sbar ok';
  document.getElementById('jogos-status').textContent=`✓ ${ALL_MATCHES_DEF.length} partidas · horários BRT e local`;
}

// ─────────────────────────────────────────────────────────────────────────────
// RENDER ODDS
// ─────────────────────────────────────────────────────────────────────────────
function renderOdds(){
  const el=document.getElementById('all-odds');
  if(!oddsData.length){
    el.innerHTML=`<div class="odds-empty">⚠️ Odds indisponíveis — configure a variável <code>ODDS_API_KEY</code> no Netlify.<br><br>Crie uma chave gratuita em <a href="https://the-odds-api.com/#get-access" target="_blank" style="color:var(--blu)">the-odds-api.com</a> e adicione em Site Settings → Environment Variables.</div>`;
    return;
  }
  const now=new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
  let html='';
  oddsData.forEach(ev=>{
    const bk=ev.bookmakers.find(b=>b.key==='bet365')||ev.bookmakers.find(b=>b.key==='pinnacle')||ev.bookmakers[0];
    if(!bk)return;
    const h2h=bk.markets.find(m=>m.key==='h2h');
    if(!h2h)return;
    const outs=h2h.outcomes;
    const home=outs.find(o=>o.name===ev.home_team);
    const away=outs.find(o=>o.name===ev.away_team);
    const draw=outs.find(o=>o.name==='Draw');
    const hP=home?+home.price:0,dP=draw?+draw.price:0,aP=away?+away.price:0;
    const min=Math.min(hP,dP||999,aP);
    const dt=new Date(ev.commence_time).toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',timeZone:'America/Sao_Paulo'});
    const tm=new Date(ev.commence_time).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit',timeZone:'America/Sao_Paulo'});
    const isBrasil=ev.home_team==='Brazil'||ev.away_team==='Brazil';
    html+=`<div class="odds-card${isBrasil?' brasil-m':''}">
      <div class="oc-header">
        <div>
          <div class="oc-match">${isBrasil?'🇧🇷 ':''}${ev.home_team} vs ${ev.away_team}</div>
          <div class="oc-date">📅 ${dt} · 🇧🇷 ${tm} BRT · ${bk.title}</div>
        </div>
      </div>
      <div class="odds-grid">
        <div class="odd-cell${hP===min&&min>0?' best':''}">
          <div class="odd-lbl">${ev.home_team.split(' ').slice(-1)[0]}</div>
          <div class="odd-val">${hP?hP.toFixed(2):'—'}</div>
        </div>
        <div class="odd-cell${dP&&dP===min?' best':''}">
          <div class="odd-lbl">Empate</div>
          <div class="odd-val">${dP?dP.toFixed(2):'—'}</div>
        </div>
        <div class="odd-cell${aP===min&&min>0&&aP!==hP?' best':''}">
          <div class="odd-lbl">${ev.away_team.split(' ').slice(-1)[0]}</div>
          <div class="odd-val">${aP?aP.toFixed(2):'—'}</div>
        </div>
      </div>
    </div>`;
  });
  el.innerHTML=html||'<div class="odds-empty">Nenhuma partida com odds disponíveis no momento.</div>';
  document.getElementById('odds-status').className='sbar ok';
  document.getElementById('odds-status').textContent=`✓ ${oddsData.length} jogos · bet365/Pinnacle · ${now} · auto-refresh 2min`;
}

// ─────────────────────────────────────────────────────────────────────────────
// SYNC
// ─────────────────────────────────────────────────────────────────────────────
async function sync(){
  setHeader('loading','Buscando dados...');
  try{
    // Resultados
    const data=await fetchWC();
    wcData=data;
    parseAndCompute(data);
    lastSync=new Date();
    const now=lastSync.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
    setHeader('ok',`✓ ${now}`);
    document.getElementById('brasil-status').className='sbar ok';
    document.getElementById('brasil-status').textContent=`✓ Dados atualizados ${now} · auto-refresh 5min`;
  }catch(e){
    setHeader('err','Erro de conexão');
    document.getElementById('brasil-status').className='sbar err';
    document.getElementById('brasil-status').textContent=`⚠️ Erro ao carregar dados: ${e.message}`;
  }
  renderAll();
  // Odds separado (não-crítico)
  try{
    const od=await fetchOdds();
    if(Array.isArray(od))oddsData=od;
  }catch(e){}
  renderOdds();
  setTimeout(sync,300000); // 5min
}

function renderAll(){
  renderBrasil();
  renderGrupos();
  renderJogos();
}

function showTab(name){
  document.querySelectorAll('.ntab').forEach((t,i)=>t.classList.toggle('active',['brasil','grupos','jogos','odds'][i]===name));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
}

// init
renderAll(); // render vazio primeiro
sync();      // depois busca dados
setInterval(()=>{
  fetchOdds().then(od=>{if(Array.isArray(od))oddsData=od;renderOdds();}).catch(()=>{});
},120000);   // odds a cada 2min
</script>
</body>
