<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loteca Copa 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:     #0d1117;
  --s1:     #161b22;
  --s2:     #1c2330;
  --s3:     #21283a;
  --bdr:    #30363d;
  --bdr2:   #3d4450;
  --gold:   #e3a008;
  --gold2:  #fbbf24;
  --gold-bg:rgba(227,160,8,.12);
  --grn:    #3fb950;
  --grn-bg: rgba(63,185,80,.13);
  --red:    #f85149;
  --red-bg: rgba(248,81,73,.13);
  --blu:    #58a6ff;
  --blu-bg: rgba(88,166,255,.13);
  --orn:    #e3b341;
  --orn-bg: rgba(227,179,65,.13);
  --txt:    #e6edf3;
  --txt2:   #8b949e;
  --txt3:   #484f58;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--txt); font-family: 'Inter', sans-serif; min-height: 100vh; }

/* ── HEADER ── */
header {
  background: var(--s1);
  border-bottom: 1px solid var(--bdr);
  padding: 12px 16px;
  display: flex; align-items: center; justify-content: space-between; gap: 12px;
  position: sticky; top: 0; z-index: 100;
}
.logo { font-family: 'Barlow Condensed', sans-serif; font-size: 1.4rem; font-weight: 900; color: var(--gold2); letter-spacing: .04em; line-height: 1; }
.logo span { color: var(--txt2); font-weight: 400; }
.hdr-actions { display: flex; align-items: center; gap: 8px; }
.hdr-scores { display: flex; gap: 6px; }
.hs { background: var(--s2); border: 1px solid var(--bdr); border-radius: 6px; padding: 4px 10px; text-align: center; }
.hs-v { font-family: 'Barlow Condensed', sans-serif; font-size: 1.1rem; font-weight: 700; line-height: 1; }
.hs-l { font-size: .58rem; color: var(--txt2); text-transform: uppercase; letter-spacing: .06em; }
.btn-icon { background: var(--s2); border: 1px solid var(--bdr); border-radius: 6px; color: var(--txt2); cursor: pointer; padding: 7px 11px; font-size: .78rem; display: flex; align-items: center; gap: 5px; transition: all .15s; white-space: nowrap; }
.btn-icon:hover { color: var(--gold2); border-color: var(--gold); }
.btn-icon.live-dot::before { content: ''; width: 6px; height: 6px; background: var(--grn); border-radius: 50%; animation: pulse 1.4s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.2} }

/* ── NAV TABS ── */
.nav { background: var(--s1); border-bottom: 1px solid var(--bdr); display: flex; overflow-x: auto; scrollbar-width: none; }
.nav::-webkit-scrollbar { display: none; }
.nav-tab { font-family: 'Barlow Condensed', sans-serif; font-size: .82rem; font-weight: 700; letter-spacing: .05em; text-transform: uppercase; padding: 10px 18px; background: none; border: none; color: var(--txt2); cursor: pointer; white-space: nowrap; border-bottom: 2px solid transparent; transition: all .15s; }
.nav-tab.active { color: var(--gold2); border-bottom-color: var(--gold2); }
.nav-tab:hover:not(.active) { color: var(--txt); }

/* ── PANELS ── */
.panel { display: none; padding: 14px 14px 60px; }
.panel.active { display: block; }

/* ── STATUS BAR ── */
.status { display: flex; align-items: center; justify-content: space-between; background: var(--s2); border: 1px solid var(--bdr); border-radius: 8px; padding: 8px 12px; margin-bottom: 12px; font-size: .72rem; color: var(--txt2); flex-wrap: wrap; gap: 6px; }
.status.ok  { border-color: var(--grn); background: var(--grn-bg); color: var(--grn); }
.status.err { border-color: var(--red); background: var(--red-bg); color: var(--red); }
.status.live { border-color: var(--gold); background: var(--gold-bg); color: var(--gold2); }

/* ── DAY GROUP ── */
.day-grp { margin-top: 16px; }
.day-hdr { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.day-lbl { font-family: 'Barlow Condensed', sans-serif; font-size: .82rem; font-weight: 700; color: var(--gold2); letter-spacing: .08em; text-transform: uppercase; white-space: nowrap; }
.day-line { flex: 1; height: 1px; background: var(--bdr); }
.day-count { font-size: .65rem; color: var(--txt2); }

/* ── GAME CARD ── */
.gcard { background: var(--s1); border: 1px solid var(--bdr); border-radius: 8px; margin-bottom: 8px; overflow: hidden; }
.gcard.correct { border-left: 3px solid var(--grn); }
.gcard.wrong   { border-left: 3px solid var(--red); }
.gcard.safe    { border-left: 3px solid var(--gold2); }
.gcard.pending { border-left: 3px solid var(--bdr2); }

.card-main { padding: 10px 12px 9px; }

/* match header */
.match-hdr { display: flex; align-items: center; gap: 8px; margin-bottom: 7px; }
.gnum { font-family: 'Barlow Condensed', sans-serif; font-size: .7rem; font-weight: 700; color: var(--txt3); width: 22px; flex-shrink: 0; }
.teams { flex: 1; display: flex; align-items: center; gap: 6px; min-width: 0; }
.tname { flex: 1; font-size: .88rem; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.tname.l { text-align: right; }
.scorebox { display: flex; align-items: center; gap: 3px; flex-shrink: 0; }
.sd { font-family: 'Barlow Condensed', sans-serif; font-size: 1.2rem; font-weight: 900; width: 24px; text-align: center; background: var(--bg); border-radius: 4px; padding: 1px 0; line-height: 1.3; }
.sd.live { color: var(--gold2); }
.sep { color: var(--txt3); font-size: .9rem; }
.edit-btn { background: none; border: 1px solid var(--bdr); border-radius: 4px; color: var(--txt2); cursor: pointer; font-size: .72rem; padding: 3px 7px; transition: all .15s; flex-shrink: 0; }
.edit-btn:hover,.edit-btn.on { color: var(--gold2); border-color: var(--gold); }

/* meta chips */
.meta { display: flex; gap: 4px; margin-bottom: 8px; flex-wrap: wrap; align-items: center; }
.chip { font-size: .63rem; color: var(--txt2); background: var(--bg); border: 1px solid var(--bdr); border-radius: 4px; padding: 2px 6px; white-space: nowrap; }
.chip.ft   { background: var(--grn-bg); border-color: var(--grn); color: var(--grn); }
.chip.live-c { background: var(--gold-bg); border-color: var(--gold); color: var(--gold2); animation: pulse 1.4s infinite; }
.chip.manual { background: var(--orn-bg); border-color: var(--orn); color: var(--orn); }

/* bets strip */
.bets { display: grid; grid-template-columns: 1fr 56px 1fr; gap: 4px; margin-bottom: 7px; }
.bc { border-radius: 6px; padding: 6px 6px; text-align: center; border: 1px solid var(--bdr); background: var(--bg); }
.bc.unmarked  { opacity: .22; }
.bc.marked    { background: var(--blu-bg); border-color: var(--blu); }
.bc.marked-x  { background: var(--orn-bg); border-color: var(--orn); }
.bc.hit       { background: var(--grn-bg); border-color: var(--grn); }
.bc.miss      { background: var(--red-bg); border-color: var(--red); opacity: .65; }
.bc.open-miss { border: 1px dashed var(--grn); opacity: .38; }
.bc-l { font-size: .6rem; color: var(--txt2); text-transform: uppercase; letter-spacing: .04em; margin-bottom: 2px; }
.bc-v { font-size: .82rem; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.2; }
.bc-x-v { font-family: 'Barlow Condensed', sans-serif; font-size: 1.2rem; font-weight: 900; color: var(--orn); line-height: 1; }
.bc.hit .bc-l,.bc.hit .bc-v,.bc.hit .bc-x-v { color: var(--grn); }
.bc.miss .bc-v,.bc.miss .bc-x-v { color: var(--red); }
.bc.marked .bc-l,.bc.marked .bc-v { color: var(--blu); }

/* odds row */
.odds-row { display: grid; grid-template-columns: 1fr 56px 1fr; gap: 4px; margin-bottom: 7px; }
.odd-box { background: var(--s2); border: 1px solid var(--bdr); border-radius: 4px; padding: 4px 5px; text-align: center; }
.odd-v { font-family: 'Barlow Condensed', sans-serif; font-size: 1rem; font-weight: 700; color: var(--txt); line-height: 1; }
.odd-bk { font-size: .57rem; color: var(--txt2); }
.odd-box.best { border-color: var(--gold); background: var(--gold-bg); }
.odd-box.best .odd-v { color: var(--gold2); }

/* status line */
.status-line { display: flex; align-items: center; justify-content: space-between; }
.pill { font-family: 'Barlow Condensed', sans-serif; font-size: .72rem; font-weight: 700; letter-spacing: .05em; padding: 3px 9px; border-radius: 20px; }
.pill-safe    { background: var(--gold-bg); color: var(--gold2); border: 1px solid var(--gold); }
.pill-correct { background: var(--grn-bg);  color: var(--grn);   border: 1px solid var(--grn); }
.pill-wrong   { background: var(--red-bg);  color: var(--red);   border: 1px solid var(--red); }
.pill-pending { background: transparent;    color: var(--txt2);  border: 1px solid var(--bdr2); }
.res-txt { font-size: .68rem; color: var(--txt2); font-style: italic; }

/* inline editor */
.editor { display: none; padding: 10px 12px; background: var(--bg); border-top: 1px solid var(--bdr); }
.editor.open { display: block; }
.ed-lbl { font-size: .65rem; color: var(--txt2); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 8px; }
.ed-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 8px; }
.ed-row label { font-size: .8rem; color: var(--txt); font-weight: 500; }
.ed-row input { width: 50px; padding: 7px 5px; background: var(--s2); border: 1px solid var(--bdr); border-radius: 5px; color: var(--txt); font-family: 'Barlow Condensed', sans-serif; font-size: 1.2rem; font-weight: 700; text-align: center; }
.ed-row input:focus { outline: none; border-color: var(--gold2); }
.ed-vs { color: var(--txt2); }
.ed-btns { display: flex; gap: 7px; flex-wrap: wrap; }
.btn-save { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: .8rem; text-transform: uppercase; padding: 7px 18px; background: var(--gold2); color: #000; border: none; border-radius: 5px; cursor: pointer; }
.btn-save:hover { background: var(--gold); }
.btn-cancel,.btn-clear { background: none; border-radius: 5px; padding: 7px 12px; cursor: pointer; font-size: .78rem; }
.btn-cancel { border: 1px solid var(--bdr); color: var(--txt2); }
.btn-clear  { border: 1px solid var(--red); color: var(--red); }

/* ── GERAL VIEW ── */
.geral-hdr { display: grid; grid-template-columns: 24px 1fr 50px 28px 28px 28px; gap: 3px; padding: 5px 8px; font-size: .6rem; color: var(--txt2); text-transform: uppercase; letter-spacing: .05em; border-bottom: 1px solid var(--bdr); }
.geral-row { display: grid; grid-template-columns: 24px 1fr 50px 28px 28px 28px; gap: 3px; padding: 8px 8px; align-items: center; background: var(--s1); border: 1px solid var(--bdr); border-radius: 7px; margin-bottom: 5px; cursor: pointer; transition: border-color .12s; }
.geral-row:hover { border-color: var(--bdr2); }
.geral-row.g-ok   { border-left: 3px solid var(--grn); }
.geral-row.g-bad  { border-left: 3px solid var(--red); }
.geral-row.g-safe { border-left: 3px solid var(--gold2); }
.geral-row.g-live { border-left: 3px solid var(--gold2); }
.gr-n { font-family: 'Barlow Condensed', sans-serif; font-size: .7rem; color: var(--txt3); font-weight: 700; }
.gr-m { font-size: .78rem; font-weight: 600; }
.gr-t { font-size: .62rem; color: var(--txt2); }
.gr-sc { text-align: center; font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: .88rem; }
.mb { font-size: .6rem; padding: 2px 4px; border-radius: 3px; font-weight: 700; border: 1px solid transparent; text-align: center; display: block; }
.mb-hit  { background: var(--grn-bg); border-color: var(--grn); color: var(--grn); }
.mb-miss { background: var(--red-bg); border-color: var(--red); color: var(--red); }
.mb-mark { background: var(--blu-bg); border-color: var(--blu); color: var(--blu); }
.mb-safe { background: var(--gold-bg); border-color: var(--gold); color: var(--gold2); }
.mb-live { background: var(--gold-bg); border-color: var(--gold); color: var(--gold2); animation: pulse 1.4s infinite; }

/* ── SUMMARY ── */
.sum { display: grid; grid-template-columns: repeat(4,1fr); gap: 6px; margin-bottom: 14px; }
.st { background: var(--s1); border: 1px solid var(--bdr); border-radius: 8px; padding: 10px 6px; text-align: center; }
.stv { font-family: 'Barlow Condensed', sans-serif; font-size: 1.6rem; font-weight: 900; line-height: 1; }
.stl { font-size: .6rem; color: var(--txt2); text-transform: uppercase; letter-spacing: .06em; margin-top: 2px; }
.rcbar { display: flex; align-items: center; justify-content: space-between; background: var(--s2); border: 1px solid var(--bdr); border-radius: 7px; padding: 9px 12px; margin-top: 12px; margin-bottom: 10px; gap: 8px; flex-wrap: wrap; }
.rc-name { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: .9rem; color: var(--gold2); text-transform: uppercase; letter-spacing: .04em; }
.rc-sub  { font-size: .65rem; color: var(--txt2); margin-top: 2px; }
.rc-tag  { font-size: .68rem; background: var(--gold-bg); border: 1px solid var(--gold); color: var(--gold2); padding: 3px 9px; border-radius: 20px; font-weight: 600; }

/* ── FOOTER ── */
.foot { text-align: center; padding: 16px 14px; font-size: .67rem; color: var(--txt3); line-height: 2; }
</style>
</head>
<body>

<header>
  <div class="logo">⚽ LOTECA <span>COPA 26</span></div>
  <div class="hdr-actions">
    <div class="hdr-scores" id="hdr-scores"></div>
    <button class="btn-icon" id="sync-btn" onclick="syncAll()">
      <span id="sync-dot" style="width:6px;height:6px;background:var(--txt3);border-radius:50%;"></span>
      <span id="sync-lbl">Atualizar</span>
    </button>
    <a href="copa.html" style="text-decoration:none">
      <button class="btn-icon">🌍 Copa</button>
    </a>
  </div>
</header>

<div class="nav">
  <button class="nav-tab active" onclick="showTab('geral')">Visão Geral</button>
  <button class="nav-tab" onclick="showTab('r1')">Recibo 1 · 47c</button>
  <button class="nav-tab" onclick="showTab('r2')">Recibo 2 · 50c</button>
  <button class="nav-tab" onclick="showTab('r3')">Meu Palpite</button>
</div>

<div id="tab-geral" class="panel active">
  <div class="status" id="main-status">Carregando resultados...</div>
  <div id="g-geral"></div>
</div>
<div id="tab-r1" class="panel">
  <div class="rcbar"><div><div class="rc-name">Recibo 1 — Bolão</div><div class="rc-sub">1 cota de 47 participantes</div></div><div class="rc-tag">47 cotas</div></div>
  <div class="sum" id="sum-r1"></div>
  <div id="g-r1"></div>
</div>
<div id="tab-r2" class="panel">
  <div class="rcbar"><div><div class="rc-name">Recibo 2 — Bolão</div><div class="rc-sub">1 cota de 50 participantes</div></div><div class="rc-tag">50 cotas</div></div>
  <div class="sum" id="sum-r2"></div>
  <div id="g-r2"></div>
</div>
<div id="tab-r3" class="panel">
  <div class="rcbar"><div><div class="rc-name">Meu Palpite</div><div class="rc-sub">Aposta individual</div></div><div class="rc-tag">Individual</div></div>
  <div class="sum" id="sum-r3"></div>
  <div id="g-r3"></div>
</div>

<div class="foot">
  <span style="color:var(--gold2)">★ TRIPLO</span> = garantido &nbsp;·&nbsp;
  <span style="color:var(--blu)">■</span> marcado &nbsp;·&nbsp;
  <span style="color:var(--grn)">✓</span> acertou &nbsp;·&nbsp;
  <span style="color:var(--red)">✗</span> errou
</div>

<script>
// ── JOGOS DO BOLÃO ────────────────────────────────────────────────────────────
// Horários: localTime = horário na cidade-sede | brTime = horário Brasília (BRT = UTC-3)
// Cidades do Leste: UTC-4 no verão → BRT = local + 1h
const GAMES = [
  {id:1,  t1:'Brasil',       t2:'Marrocos',   date:'2026-06-13', localTime:'16:00', localZone:'ET (Nova York)', brTime:'19:00', city:'Nova York/NJ',  grp:'C', wc:['Brazil','Morocco']},
  {id:2,  t1:'Haiti',        t2:'Escócia',    date:'2026-06-14', localTime:'01:00', localZone:'ET',             brTime:'22:00', city:'Boston',         grp:'C', wc:['Haiti','Scotland']},
  {id:3,  t1:'Alemanha',     t2:'Curaçao',    date:'2026-06-14', localTime:'14:00', localZone:'CT (Houston)',   brTime:'17:00', city:'Houston',        grp:'E', wc:['Germany','Curaçao']},
  {id:4,  t1:'Holanda',      t2:'Japão',      date:'2026-06-14', localTime:'17:00', localZone:'CT (Dallas)',    brTime:'20:00', city:'Dallas',         grp:'F', wc:['Netherlands','Japan']},
  {id:5,  t1:'C. do Marfim', t2:'Equador',    date:'2026-06-14', localTime:'20:00', localZone:'ET (Filadélfia)',brTime:'23:00', city:'Filadélfia',     grp:'E', wc:["Côte d'Ivoire",'Ecuador']},
  {id:6,  t1:'Suécia',       t2:'Tunísia',    date:'2026-06-15', localTime:'23:00', localZone:'CT (Monterrey)',brTime:'02:00', city:'Monterrey',      grp:'F', wc:['Sweden','Tunisia']},
  {id:7,  t1:'Espanha',      t2:'Cabo Verde', date:'2026-06-15', localTime:'13:00', localZone:'ET (Atlanta)',   brTime:'16:00', city:'Atlanta',        grp:'H', wc:['Spain','Cape Verde']},
  {id:8,  t1:'Bélgica',      t2:'Egito',      date:'2026-06-15', localTime:'16:00', localZone:'PT (Seattle)',   brTime:'21:00', city:'Seattle',        grp:'G', wc:['Belgium','Egypt']},
  {id:9,  t1:'Ar. Saudita',  t2:'Uruguai',    date:'2026-06-15', localTime:'19:00', localZone:'ET (Miami)',     brTime:'22:00', city:'Miami',          grp:'H', wc:['Saudi Arabia','Uruguay']},
  {id:10, t1:'França',       t2:'Senegal',    date:'2026-06-16', localTime:'16:00', localZone:'ET (Nova York)', brTime:'19:00', city:'Nova York/NJ',   grp:'I', wc:['France','Senegal']},
  {id:11, t1:'Iraque',       t2:'Noruega',    date:'2026-06-16', localTime:'19:00', localZone:'ET (Boston)',    brTime:'22:00', city:'Boston',         grp:'I', wc:['Iraq','Norway']},
  {id:12, t1:'Argentina',    t2:'Argélia',    date:'2026-06-17', localTime:'22:00', localZone:'CT (Kansas City)',brTime:'01:00',city:'Kansas City',    grp:'J', wc:['Argentina','Algeria']},
  {id:13, t1:'Portugal',     t2:'Congo',      date:'2026-06-17', localTime:'14:00', localZone:'CT (Houston)',   brTime:'17:00', city:'Houston',        grp:'K', wc:['Portugal','DR Congo']},
  {id:14, t1:'Inglaterra',   t2:'Croácia',    date:'2026-06-17', localTime:'17:00', localZone:'CT (Dallas)',    brTime:'20:00', city:'Dallas',         grp:'L', wc:['England','Croatia']},
];

const R1=[
  {c1:1,x:1,c2:1},{c1:1,x:1,c2:1},{c1:1,x:0,c2:0},{c1:1,x:1,c2:0},
  {c1:1,x:1,c2:0},{c1:1,x:0,c2:1},{c1:1,x:0,c2:0},{c1:1,x:1,c2:1},
  {c1:1,x:0,c2:1},{c1:1,x:0,c2:0},{c1:0,x:0,c2:1},{c1:1,x:0,c2:0},
  {c1:1,x:0,c2:0},{c1:1,x:1,c2:0},
];
const R2=[
  {c1:1,x:0,c2:0},{c1:1,x:1,c2:1},{c1:1,x:1,c2:1},{c1:1,x:1,c2:1},
  {c1:0,x:0,c2:1},{c1:0,x:1,c2:0},{c1:1,x:0,c2:0},{c1:1,x:0,c2:0},
  {c1:1,x:0,c2:0},{c1:1,x:1,c2:1},{c1:0,x:0,c2:1},{c1:1,x:1,c2:1},
  {c1:1,x:0,c2:0},{c1:1,x:1,c2:1},
];
const R3=[
  {c1:1,x:1,c2:0},{c1:0,x:0,c2:1},{c1:1,x:0,c2:0},{c1:1,x:1,c2:1},
  {c1:1,x:1,c2:1},{c1:1,x:0,c2:0},{c1:1,x:0,c2:0},{c1:1,x:1,c2:0},
  {c1:0,x:0,c2:1},{c1:1,x:0,c2:0},{c1:0,x:0,c2:1},{c1:1,x:0,c2:0},
  {c1:1,x:0,c2:0},{c1:1,x:1,c2:1},
];
const ALL=[R1,R2,R3];

// ── STATE ──────────────────────────────────────────────────────────────────
let manual=JSON.parse(localStorage.getItem('lc26_m')||'{}');
let wcScores={};  // {gameId:{g1,g2,state}}
let oddsMap={};   // keyed by normalized "team1 vs team2"
let syncing=false;

function saveManual(){localStorage.setItem('lc26_m',JSON.stringify(manual));}

// ── LOGIC ──────────────────────────────────────────────────────────────────
function outcome(sc){
  if(!sc||sc.g1==null||sc.g1===''||sc.g2==null||sc.g2==='')return null;
  const a=+sc.g1,b=+sc.g2; if(isNaN(a)||isNaN(b))return null;
  return a>b?'c1':a===b?'x':'c2';
}
function check(p,sc){
  const o=outcome(sc); if(!o)return'pending';
  return(o==='c1'&&p.c1)||(o==='x'&&p.x)||(o==='c2'&&p.c2)?'correct':'wrong';
}
function isTriple(p){return !!(p.c1&&p.x&&p.c2);}
function nMark(p){return p.c1+p.x+p.c2;}
function getScore(id){return manual[id]||wcScores[id]||null;}
function cardSt(p,sc){
  if(isTriple(p))return'safe';
  if(sc&&sc.state==='in')return'live';
  return check(p,sc);
}
function today(){return new Date().toISOString().slice(0,10);}
function fmtDate(d){
  const[y,m,dd]=d.split('-');
  const D=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
  return D[new Date(+y,+m-1,+dd).getDay()]+' '+dd+'/'+m;
}
function betCls(key,p,oc){
  const mk=!!p[key];
  if(oc){if(oc===key)return mk?'hit':'open-miss';return mk?'miss':'unmarked';}
  if(!mk)return'unmarked';
  return key==='x'?'marked-x':'marked';
}

// ── ODDS ──────────────────────────────────────────────────────────────────
function getOdds(g){
  // normalizar nome para match com the-odds-api
  const normKey = [g.wc[0],g.wc[1]].sort().join('|');
  return oddsMap[normKey]||null;
}

function renderOddsRow(g, oc){
  const odds=getOdds(g);
  if(!odds) return '';
  const {h,d,a,bk}=odds;
  // determinar qual é Col1/Col2
  const hPrice=h?h.toFixed(2):'?';
  const dPrice=d?d.toFixed(2):'?';
  const aPrice=a?a.toFixed(2):'?';
  // destaque na melhor odd para o resultado
  function cls(key){if(!oc)return'';if(key==='c1'&&oc==='c1')return' best';if(key==='x'&&oc==='x')return' best';if(key==='c2'&&oc==='c2')return' best';return'';}
  return `<div class="odds-row">
    <div class="odd-box${cls('c1')}"><div class="odd-v">${hPrice}</div><div class="odd-bk">${bk}</div></div>
    <div class="odd-box${cls('x')}"><div class="odd-v">${dPrice}</div><div class="odd-bk">Emp.</div></div>
    <div class="odd-box${cls('c2')}"><div class="odd-v">${aPrice}</div><div class="odd-bk">${bk}</div></div>
  </div>`;
}

// ── FETCH ──────────────────────────────────────────────────────────────────
async function fetchWC(){
  const r=await fetch('/api/wc'); if(!r.ok)throw new Error('HTTP '+r.status);
  return r.json();
}
async function fetchOdds(){
  const r=await fetch('/api/odds'); if(!r.ok)throw new Error('HTTP '+r.status);
  return r.json();
}

function parseMatch(m,idx){
  const ft=m.score&&m.score.ft;
  const has=!!(ft&&ft.length===2);
  return{
    id:'wc-'+idx, date:m.date, time:m.time||'',
    state:has?'post':'pre', completed:has,
    team1:m.team1,team2:m.team2,
    home:{name:m.team1,score:has?String(ft[0]):null,winner:has&&ft[0]>ft[1]},
    away:{name:m.team2,score:has?String(ft[1]):null,winner:has&&ft[1]>ft[0]},
  };
}
function findBolao(m){
  for(const g of GAMES){
    if(g.wc[0]===m.team1&&g.wc[1]===m.team2)return{gid:g.id,norm:true};
    if(g.wc[1]===m.team1&&g.wc[0]===m.team2)return{gid:g.id,norm:false};
  }return null;
}

function setSyncUI(state,label){
  const dot=document.getElementById('sync-dot');
  const lbl=document.getElementById('sync-lbl');
  if(!dot)return;
  if(state==='live'){dot.style.background='var(--grn)';dot.style.animation='pulse 1.2s infinite';}
  else if(state==='err'){dot.style.background='var(--red)';dot.style.animation='';}
  else if(state==='loading'){dot.style.background='var(--gold2)';dot.style.animation='pulse .8s infinite';}
  else{dot.style.background='var(--txt3)';dot.style.animation='';}
  lbl.textContent=label||'Atualizar';
}

async function syncAll(){
  if(syncing)return;
  syncing=true;
  setSyncUI('loading','Buscando...');
  let matchCount=0,oddsCount=0;
  // 1. Resultados
  try{
    const data=await fetchWC();
    (data.matches||[]).forEach((m,i)=>{
      const found=findBolao(m);
      if(!found||manual[found.gid])return;
      const p=parseMatch(m,i);
      const g1=found.norm?p.home.score:p.away.score;
      const g2=found.norm?p.away.score:p.home.score;
      wcScores[found.gid]={g1:g1||'',g2:g2||'',state:p.state};
      if(g1&&g2)matchCount++;
    });
  }catch(e){console.warn('WC fetch:',e);}
  // 2. Odds
  try{
    const data=await fetchOdds();
    if(Array.isArray(data)){
      data.forEach(ev=>{
        const bk=ev.bookmakers&&ev.bookmakers[0];
        if(!bk)return;
        const h2h=bk.markets&&bk.markets.find(m=>m.key==='h2h');
        if(!h2h)return;
        const outcomes=h2h.outcomes||[];
        const home=outcomes.find(o=>o.name===ev.home_team);
        const away=outcomes.find(o=>o.name===ev.away_team);
        const draw=outcomes.find(o=>o.name==='Draw');
        const normKey=[ev.home_team,ev.away_team].sort().join('|');
        oddsMap[normKey]={h:home&&home.price,d:draw&&draw.price,a:away&&away.price,bk:bk.title,home:ev.home_team};
        oddsCount++;
      });
    }
  }catch(e){console.warn('Odds fetch:',e);}

  const now=new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
  setSyncUI(matchCount>0?'live':'ok', `✓ ${now} · ${matchCount} resultados${oddsCount?', '+oddsCount+' odds':''}`);
  syncing=false;
  renderAll();

  // update status bar
  const sb=document.getElementById('main-status');
  if(sb){
    sb.className='status ok';
    sb.textContent=`Atualizado ${now} · ${matchCount} resultados · ${oddsCount} odds de bookmakers`;
  }

  setTimeout(syncAll, 300000);
}

// ── RENDER ──────────────────────────────────────────────────────────────────
function renderSum(id,pals){
  let c=0,w=0,p=0,s=0;
  GAMES.forEach((g,i)=>{
    if(isTriple(pals[i])){s++;return;}
    const st=check(pals[i],getScore(g.id));
    if(st==='correct')c++;else if(st==='wrong')w++;else p++;
  });
  document.getElementById(id).innerHTML=
    `<div class="st"><div class="stv" style="color:var(--gold2)">${s}</div><div class="stl">Triplos ★</div></div>`+
    `<div class="st"><div class="stv" style="color:var(--grn)">${c}</div><div class="stl">Acertos</div></div>`+
    `<div class="st"><div class="stv" style="color:var(--red)">${w}</div><div class="stl">Erros</div></div>`+
    `<div class="st"><div class="stv" style="color:var(--blu)">${p}</div><div class="stl">Pendentes</div></div>`;
}

function makeCard(g,i,pals,cid){
  const p=pals[i],sc=getScore(g.id),oc=outcome(sc),st=cardSt(p,sc);
  const isLive=sc&&sc.state==='in',isPost=sc&&sc.state==='post',hasScore=oc!==null,hasM=!!manual[g.id];

  const scoreH=hasScore
    ?`<span class="sd${isLive?' live':''}">${sc.g1}</span><span class="sep">:</span><span class="sd${isLive?' live':''}">${sc.g2}</span>`
    :`<span class="sd" style="color:var(--txt3)">—</span><span class="sep">:</span><span class="sd" style="color:var(--txt3)">—</span>`;

  let statusChip='';
  if(isLive) statusChip='<span class="chip live-c">🔴 AO VIVO</span>';
  else if(isPost||hasScore) statusChip='<span class="chip ft">FT ✓</span>';

  let pill='';
  if(st==='safe')    pill='<span class="pill pill-safe">★ TRIPLO — GARANTIDO</span>';
  else if(st==='correct') pill='<span class="pill pill-correct">✓ ACERTOU</span>';
  else if(st==='wrong')   pill='<span class="pill pill-wrong">✗ ERROU</span>';
  else{
    const n=nMark(p);
    pill=n===3?'<span class="pill pill-safe">★ TRIPLO</span>':
         n===2?'<span class="pill pill-pending">DUPLO · 2 chances</span>':
               '<span class="pill pill-pending">SIMPLES · 1 chance</span>';
  }

  const resTxt=oc?(oc==='c1'?g.t1+' venceu':oc==='x'?'Empate':g.t2+' venceu'):'';

  function bc(key){
    const cls=betCls(key,p,oc);
    if(key==='x') return `<div class="bc ${cls}"><div class="bc-l">Empate</div><div class="bc-x-v">${p.x?'X':'—'}</div></div>`;
    const lbl=key==='c1'?g.t1:g.t2;
    return `<div class="bc ${cls}"><div class="bc-l">Col.${key==='c1'?'1':'2'}</div><div class="bc-v">${p[key]?lbl:'—'}</div></div>`;
  }

  const div=document.createElement('div');
  div.className=`gcard ${st}`; div.id=`${cid}-g${g.id}`;
  div.innerHTML=`
  <div class="card-main">
    <div class="match-hdr">
      <span class="gnum">${String(g.id).padStart(2,'0')}</span>
      <div class="teams">
        <span class="tname l">${g.t1}</span>
        <div class="scorebox">${scoreH}</div>
        <span class="tname">${g.t2}</span>
      </div>
      <button class="edit-btn${hasM?' on':''}" id="eb-${cid}-${g.id}" onclick="toggleEd('${cid}',${g.id},this)">✏️</button>
    </div>
    <div class="meta">
      <span class="chip">🕐 ${g.localTime} ${g.localZone}</span>
      <span class="chip" style="color:var(--gold2);border-color:var(--gold)">🇧🇷 ${g.brTime} BRT</span>
      <span class="chip">📍 ${g.city}</span>
      <span class="chip" style="color:var(--txt3)">Gr.${g.grp}</span>
      ${statusChip}
      ${hasM?'<span class="chip manual">✏️ manual</span>':''}
    </div>
    <div class="bets">${bc('c1')}${bc('x')}${bc('c2')}</div>
    ${renderOddsRow(g,oc)}
    <div class="status-line">${pill}<span class="res-txt">${resTxt}</span></div>
  </div>
  <div class="editor" id="ed-${cid}-${g.id}">
    <div class="ed-lbl">${hasM?'Placar manual ativo — editar':'Inserir placar manualmente'}</div>
    <div class="ed-row">
      <label>${g.t1}</label>
      <input type="number" min="0" max="30" id="i1-${cid}-${g.id}" value="${hasM?manual[g.id].g1:''}" placeholder="0">
      <span class="ed-vs">×</span>
      <input type="number" min="0" max="30" id="i2-${cid}-${g.id}" value="${hasM?manual[g.id].g2:''}" placeholder="0">
      <label>${g.t2}</label>
    </div>
    <div class="ed-btns">
      <button class="btn-save" onclick="saveM('${cid}',${g.id})">Salvar</button>
      <button class="btn-cancel" onclick="toggleEd('${cid}',${g.id},document.getElementById('eb-${cid}-${g.id}'))">Fechar</button>
      ${hasM?`<button class="btn-clear" onclick="clearM(${g.id})">Remover manual</button>`:''}
    </div>
  </div>`;
  return div;
}

function renderGames(elId,pals){
  const el=document.getElementById(elId); el.innerHTML='';
  const byDay={},dO=[];
  GAMES.forEach((g,i)=>{if(!byDay[g.date]){byDay[g.date]=[];dO.push(g.date);}byDay[g.date].push({g,i});});
  const td=today();
  dO.forEach(dk=>{
    const items=byDay[dk],dg=document.createElement('div'); dg.className='day-grp';
    dg.innerHTML=`<div class="day-hdr"><span class="day-lbl">${fmtDate(dk)}${dk===td?' · <span style="color:var(--gold2)">HOJE</span>':''}</span><div class="day-line"></div><span class="day-count">${items.length} jogos</span></div>`;
    items.forEach(({g,i})=>dg.appendChild(makeCard(g,i,pals,elId)));
    el.appendChild(dg);
  });
}

function renderGeral(){
  const el=document.getElementById('g-geral'); el.innerHTML='';
  const byDay={},dO=[];
  GAMES.forEach((g,i)=>{if(!byDay[g.date]){byDay[g.date]=[];dO.push(g.date);}byDay[g.date].push({g,i});});
  const td=today();
  dO.forEach(dk=>{
    const items=byDay[dk],dg=document.createElement('div'); dg.className='day-grp';
    dg.innerHTML=`<div class="day-hdr"><span class="day-lbl">${fmtDate(dk)}${dk===td?' · <span style="color:var(--gold2)">HOJE</span>':''}</span><div class="day-line"></div><span class="day-count">${items.length} jogos</span></div>`;
    const hdr=document.createElement('div'); hdr.className='geral-hdr';
    hdr.innerHTML='<span>#</span><span>Partida</span><span style="text-align:center">Placar</span><span style="text-align:center">R1</span><span style="text-align:center">R2</span><span style="text-align:center">Meu</span>';
    dg.appendChild(hdr);
    items.forEach(({g,i})=>{
      const sc=getScore(g.id),oc=outcome(sc),isLive=sc&&sc.state==='in',has=oc!==null;
      function rb(pals){
        const p=pals[i];
        if(isTriple(p))return'<div style="text-align:center"><span class="mb mb-safe">★</span></div>';
        if(isLive)return'<div style="text-align:center"><span class="mb mb-live">⚡</span></div>';
        const st=check(p,sc);
        if(st==='correct')return'<div style="text-align:center"><span class="mb mb-hit">✓</span></div>';
        if(st==='wrong')return'<div style="text-align:center"><span class="mb mb-miss">✗</span></div>';
        const mx=[];if(p.c1)mx.push('1');if(p.x)mx.push('X');if(p.c2)mx.push('2');
        return`<div style="text-align:center"><span class="mb mb-mark">${mx.join('')}</span></div>`;
      }
      const scStr=has?`<span style="font-family:'Barlow Condensed',sans-serif;font-weight:700;${isLive?'color:var(--gold2)':''}">${sc.g1}:${sc.g2}</span>`:'<span style="color:var(--txt3)">-:-</span>';
      const allSafe=ALL.every(pl=>isTriple(pl[i]));
      const anyWrong=has&&ALL.some(pl=>!isTriple(pl[i])&&check(pl[i],sc)==='wrong');
      const allOk=ALL.every(pl=>isTriple(pl[i])||check(pl[i],sc)==='correct');
      let rc=isLive?'g-live':allSafe||allOk?'g-ok':anyWrong?'g-bad':'';
      const row=document.createElement('div'); row.className='geral-row '+rc;
      row.innerHTML=`<span class="gr-n">${String(g.id).padStart(2,'0')}</span>
        <div><div class="gr-m">${g.t1} <span style="color:var(--txt2);font-weight:400">vs</span> ${g.t2}</div>
        <div class="gr-t">🕐 ${g.localTime} ${g.localZone} / 🇧🇷 ${g.brTime}</div></div>
        <div class="gr-sc" style="text-align:center">${scStr}</div>${rb(R1)}${rb(R2)}${rb(R3)}`;
      row.onclick=()=>{showTab('r1');setTimeout(()=>{const t=document.getElementById('g-r1-g'+g.id);if(t)t.scrollIntoView({behavior:'smooth',block:'center'});},120);};
      dg.appendChild(row);
    });
    el.appendChild(dg);
  });
  // header scores
  let c1=0,c2=0,c3=0;
  GAMES.forEach((g,i)=>{
    const sc=getScore(g.id);
    if(check(R1[i],sc)==='correct'||isTriple(R1[i]))c1++;
    if(check(R2[i],sc)==='correct'||isTriple(R2[i]))c2++;
    if(check(R3[i],sc)==='correct'||isTriple(R3[i]))c3++;
  });
  document.getElementById('hdr-scores').innerHTML=
    `<div class="hs"><div class="hs-v" style="color:var(--grn)">${c1}</div><div class="hs-l">R1</div></div>`+
    `<div class="hs"><div class="hs-v" style="color:var(--grn)">${c2}</div><div class="hs-l">R2</div></div>`+
    `<div class="hs"><div class="hs-v" style="color:var(--grn)">${c3}</div><div class="hs-l">Meu</div></div>`;
}

// ── AÇÕES ──────────────────────────────────────────────────────────────────
function toggleEd(cid,id,btn){
  const ed=document.getElementById(`ed-${cid}-${id}`);
  ed.classList.toggle('open');
  if(btn)btn.classList.toggle('on',ed.classList.contains('open'));
}
function saveM(cid,id){
  const g1=document.getElementById(`i1-${cid}-${id}`).value.trim();
  const g2=document.getElementById(`i2-${cid}-${id}`).value.trim();
  if(g1===''||g2===''){alert('Preencha os dois campos.');return;}
  manual[id]={g1,g2};saveManual();renderAll();
}
function clearM(id){delete manual[id];saveManual();renderAll();}
function showTab(name){
  document.querySelectorAll('.nav-tab').forEach((t,i)=>t.classList.toggle('active',['geral','r1','r2','r3'][i]===name));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
}
function renderAll(){
  renderGeral();
  renderGames('g-r1',R1); renderSum('sum-r1',R1);
  renderGames('g-r2',R2); renderSum('sum-r2',R2);
  renderGames('g-r3',R3); renderSum('sum-r3',R3);
}

renderAll();
syncAll();
</script>
</body>
